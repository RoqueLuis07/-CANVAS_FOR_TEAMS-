{% extends "base.html" %}
{% block title %}Cursos Canvas{% endblock %}
{% block breadcrumb %}Canvas LMS › Cursos{% endblock %}
{% block nav_cc %}active{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-3 flex-wrap">
  <div><div class="page-title">Cursos Canvas</div><div class="page-subtitle">Gestión de cursos de la plataforma</div></div>
  <div class="ms-auto d-flex gap-2 flex-wrap">
    <button class="btn btn-info" onclick="openBulkAttendanceDownload()" title="Descargar reportes de asistencia de varios cursos a la vez"><i class="bi bi-download me-1"></i>Reportes Asistencias</button>
    <button class="btn btn-success" onclick="openCreateCourse()"><i class="bi bi-plus-circle-fill me-1"></i>Crear curso</button>
    <button class="btn btn-primary" onclick="openExcelCourses()"><i class="bi bi-table me-1"></i>Carga Conjunta</button>
  </div>
</div>

<div class="table-card">
  <div class="card-header flex-wrap gap-2">
    <input type="text" id="searchCourse" class="form-control search-box" placeholder="🔍 ID, nombre, código, SIS..." oninput="applyFilters()">
    <select id="stateFilter" class="form-select filter-select-sm" title="Filtrar por estado" onchange="applyFilters()">
      <option value="">Todos los estados</option>
      <option value="available">✅ Publicado</option>
      <option value="unpublished">⬜ No publicado</option>
      <option value="completed">🔵 Concluido</option>
      <option value="deleted">🔴 Eliminado</option>
      <option value="created">📝 Borrador</option>
    </select>
    <select id="termFilter" class="form-select filter-select-md" title="Filtrar por período" onchange="applyFilters()">
      <option value="">Todos los períodos</option>
    </select>
    <span class="ms-auto text-muted small" id="courseCount"></span>
    <button type="button" class="btn btn-sm btn-outline-success" onclick="exportTableToExcel('tableWrap','canvas_cursos.xlsx')" title="Exportar a Excel" aria-label="Exportar a Excel"><i class="bi bi-file-earmark-arrow-down"></i></button>
    <button type="button" class="btn btn-sm btn-outline-primary" onclick="loadCourses()" title="Recargar" aria-label="Recargar lista"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
  <div id="tableWrap" class="table-responsive">
    <div class="text-center py-5"><span class="spinner-border"></span></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let _allCourses = [];

/* ── Estado: etiqueta + colores Canvas-style ── */
const _STATE_CFG = {
  available:   { label: 'Publicado',     bg: '#0B874B', icon: 'bi-broadcast'         },
  unpublished: { label: 'No publicado',  bg: '#6C7982', icon: 'bi-eye-slash'          },
  completed:   { label: 'Concluido',     bg: '#0770A3', icon: 'bi-check-circle'       },
  deleted:     { label: 'Eliminado',     bg: '#C7003D', icon: 'bi-trash'              },
  created:     { label: 'Borrador',      bg: '#C68A0A', icon: 'bi-pencil'             },
  claimed:     { label: 'Borrador',      bg: '#C68A0A', icon: 'bi-pencil'             },
};
function stateBadge(state) {
  const cfg = _STATE_CFG[state] || { label: state || '—', bg: '#6C7982', icon: 'bi-question-circle' };
  return `<span class="badge d-inline-flex align-items-center gap-1"
               style="background:${cfg.bg};font-size:.72rem;padding:3px 8px">
            <i class="bi ${cfg.icon}" style="font-size:.68rem"></i>${cfg.label}
          </span>`;
}

function applyFilters() {
  const q    = document.getElementById('searchCourse').value.toLowerCase();
  const st   = document.getElementById('stateFilter').value;
  const term = document.getElementById('termFilter').value;

  const filtered = _allCourses.filter(c => {
    if (st   && c.workflow_state !== st)                return false;
    if (term && (c.term?.name || '') !== term)          return false;
    if (q) {
      const hay = [c.id, c.name, c.course_code, c.sis_course_id,
                   c.term?.name, c.start_at, c.end_at]
                  .join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('courseCount').textContent =
    filtered.length + (filtered.length !== _allCourses.length ? ` / ${_allCourses.length}` : '') + ' cursos';
  pgInit('tableWrap', filtered, renderCoursesTable);
}

/* ── Tabla estilo Canvas LMS ── */
function renderCoursesTable(courses) {
  const esc  = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#x27;');
  const fmtDate = d => d ? new Date(d).toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit',year:'numeric'}) : '—';

  document.getElementById('tableWrap').innerHTML = `
    <table class="table table-sm table-hover mb-0">
      <thead>
        <tr>
          <th style="width:70px">ID</th>
          <th>Nombre del curso</th>
          <th>SIS ID</th>
          <th>Período</th>
          <th>Inicio</th>
          <th>Fin</th>
          <th>Estado</th>
          <th style="width:110px">Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${courses.map(row => {
          const termName = row.term?.name || '—';
          const termId   = row.enrollment_term_id || '';
          return `
          <tr class="course-row" data-course='${esc(JSON.stringify(row))}'>
            <td>
              <span class="fw-semibold small">${row.id}</span>
              <button type="button" class="btn-copy-id copy-btn" title="Copiar ID"
                      data-copy-id="${row.id}" data-copy-label="Course ID">
                <i class="bi bi-files"></i>
              </button>
            </td>
            <td>
              <div class="fw-semibold td-name" style="line-height:1.3">${esc(row.name)}</div>
              <div class="text-muted small">${esc(row.course_code || '')}
                ${row.sis_course_id ? `<span class="ms-2 id-chip">${esc(row.sis_course_id)}</span>` : ''}
              </div>
            </td>
            <td class="text-muted small">${esc(row.sis_course_id || '—')}</td>
            <td>
              <span class="badge bg-light text-dark border" style="font-size:.72rem">
                <i class="bi bi-calendar3 me-1 text-canvas-blue"></i>${esc(termName)}
              </span>
            </td>
            <td class="small text-muted">${fmtDate(row.start_at)}</td>
            <td class="small text-muted">${fmtDate(row.end_at)}</td>
            <td>${stateBadge(row.workflow_state)}</td>
            <td>
              <button class="btn btn-sm btn-outline-info me-1 view-enrollments-btn"
                      title="Ver matrículas"
                      data-course-id="${row.id}" data-course-name="${esc(row.name)}">
                <i class="bi bi-people"></i>
              </button>
              <button class="btn btn-sm btn-outline-warning me-1 attendance-btn"
                      title="Asistencias"
                      data-course-id="${row.id}" data-course-name="${esc(row.name)}">
                <i class="bi bi-calendar-check"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger delete-course-btn"
                      title="Concluir curso"
                      data-course-id="${row.id}" data-course-name="${esc(row.name)}">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  document.querySelectorAll('#tableWrap .copy-btn').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); copyToClipboard(btn.dataset.copyId, btn.dataset.copyLabel); })
  );
  document.querySelectorAll('#tableWrap .course-row').forEach(row =>
    row.addEventListener('click', () => openEditCourse(JSON.parse(row.dataset.course.replace(/&#x27;/g,"'"))))
  );
  document.querySelectorAll('#tableWrap .view-enrollments-btn').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); viewEnrollments(btn.dataset.courseId, btn.dataset.courseName); })
  );
  document.querySelectorAll('#tableWrap .attendance-btn').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); openAttendanceModal(btn.dataset.courseId, btn.dataset.courseName); })
  );
  document.querySelectorAll('#tableWrap .delete-course-btn').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); deleteCourse(btn.dataset.courseId, btn.dataset.courseName); })
  );
}

async function loadCourses() {
  document.getElementById('tableWrap').innerHTML =
    '<div class="text-center py-5"><span class="spinner-border"></span><div class="text-muted small mt-2">Cargando todos los cursos…</div></div>';
  try {
    const courses = await api.get('/canvas/courses');
    _allCourses = courses;

    // Poblar dropdown de períodos con los términos únicos presentes
    const termSel = document.getElementById('termFilter');
    const terms   = [...new Set(courses.map(c => c.term?.name).filter(Boolean))].sort();
    termSel.innerHTML = '<option value="">Todos los períodos</option>';
    terms.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      termSel.appendChild(o);
    });

    document.getElementById('courseCount').textContent = courses.length + ' cursos';
    pgInit('tableWrap', _allCourses, renderCoursesTable);
  } catch(e) { toast('Error cargando cursos: ' + e.message, 'danger'); }
}

function openCreateCourse() {
  showModal('Crear Curso Canvas', `
    <form id="courseForm">
      <div class="row g-3">
        <div class="col-md-8"><label class="form-label">Nombre *</label><input class="form-control" name="name" required></div>
        <div class="col-md-4"><label class="form-label">Código *</label><input class="form-control" name="course_code" required></div>
        <div class="col-md-6"><label class="form-label">SIS Course ID</label><input class="form-control" name="sis_course_id"></div>
        <div class="col-md-3"><label class="form-label">Inicio</label><input type="date" class="form-control" name="start_at"></div>
        <div class="col-md-3"><label class="form-label">Fin</label><input type="date" class="form-control" name="end_at"></div>
      </div>
    </form>`,
    `<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
     <button class="btn btn-success" id="saveBtn" onclick="saveCourse()"><i class="bi bi-check-lg me-1"></i>Guardar</button>`);
}

async function saveCourse() {
  const btn = document.getElementById('saveBtn');
  const form = document.getElementById('courseForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const fd = new FormData(form);
  const data = {
    name: fd.get('name'), course_code: fd.get('course_code'),
    sis_course_id: fd.get('sis_course_id') || null,
    start_at: fd.get('start_at') || null, end_at: fd.get('end_at') || null,
  };
  setLoading(btn, true);
  try {
    await api.post('/canvas/courses', data);
    toast('Curso creado correctamente', 'success');
    closeModal(); loadCourses();
  } catch(e) { toast('Error: ' + e.message, 'danger'); }
  finally { setLoading(btn, false); }
}

function openEditCourse(c) {
  showModal('Editar Curso: ' + c.name, `
    <form id="editForm">
      <div class="row g-3">
        <div class="col-md-8"><label class="form-label">Nombre</label><input class="form-control" name="name" value="${c.name||''}"></div>
        <div class="col-md-4"><label class="form-label">Código</label><input class="form-control" name="course_code" value="${c.course_code||''}"></div>
        <div class="col-md-6"><label class="form-label">SIS Course ID</label><input class="form-control" name="sis_course_id" value="${c.sis_course_id||''}"></div>
        <div class="col-md-3"><label class="form-label">Inicio</label><input type="date" class="form-control" name="start_at" value="${(c.start_at||'').substring(0,10)}"></div>
        <div class="col-md-3"><label class="form-label">Fin</label><input type="date" class="form-control" name="end_at" value="${(c.end_at||'').substring(0,10)}"></div>
        <div class="col-md-6">
          <label class="form-label">Estado</label>
          <select class="form-select" name="event">
            <option value="">Sin cambio</option>
            <option value="offer">Publicar (offer)</option>
            <option value="conclude">Concluir</option>
            <option value="delete">Eliminar</option>
          </select>
        </div>
      </div>
    </form>`,
    `<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
     <button class="btn btn-primary" id="editBtn" onclick="updateCourse('${c.id}')"><i class="bi bi-check-lg me-1"></i>Actualizar</button>`);
}

async function updateCourse(id) {
  const btn = document.getElementById('editBtn');
  const fd = new FormData(document.getElementById('editForm'));
  const data = {};
  if (fd.get('name'))         data.name        = fd.get('name');
  if (fd.get('course_code'))  data.course_code  = fd.get('course_code');
  if (fd.get('sis_course_id')) data.sis_course_id = fd.get('sis_course_id');
  if (fd.get('start_at'))     data.start_at     = fd.get('start_at');
  if (fd.get('end_at'))       data.end_at       = fd.get('end_at');
  setLoading(btn, true);
  try {
    await api.put('/canvas/courses/' + id, data);
    const event = fd.get('event');
    if (event) await api.del('/canvas/courses/' + id + '?event=' + event);
    toast('Curso actualizado', 'success'); closeModal(); loadCourses();
  } catch(e) { toast('Error: ' + e.message, 'danger'); }
  finally { setLoading(btn, false); }
}

function deleteCourse(id, name) {
  confirmAction(`¿Concluir el curso <strong>${name}</strong>?`, async () => {
    try { await api.del('/canvas/courses/' + id + '?event=conclude'); toast('Curso concluido', 'success'); loadCourses(); }
    catch(e) { toast('Error: ' + e.message, 'danger'); }
  });
}

function viewEnrollments(courseId, name) {
  window.location.href = '/ui/canvas/enrollments?course_id=' + courseId;
}

function openAttendanceModal(courseId, courseName) {
  showModal(`Reporte de Asistencias: ${courseName}`, `
    <form id="attendanceForm">
      <div class="alert alert-info small mb-3">
        <i class="bi bi-info-circle me-1"></i>Se cargarán todas las asistencias registradas desde la creación del curso
      </div>
      <div id="attendanceResults" class="mt-3"></div>
    </form>`,
    `<button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
     <button class="btn btn-primary" id="loadAttendanceBtn" onclick="loadAttendanceData('${courseId}')"><i class="bi bi-search me-1"></i>Cargar asistencias</button>
     <button class="btn btn-success" id="downloadAttendanceBtn" onclick="downloadAttendanceExcel('${courseId}','${courseName}')" style="display:none"><i class="bi bi-download me-1"></i>Descargar Excel</button>`);
}

let _currentAttendanceData = null;

async function loadAttendanceData(courseId) {
  const btn     = document.getElementById('loadAttendanceBtn');
  const dlBtn   = document.getElementById('downloadAttendanceBtn');
  const results = document.getElementById('attendanceResults');
  setLoading(btn, true);
  dlBtn.style.display = 'none';

  try {
    const resp = await fetch(`/canvas/courses/${courseId}/attendance`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    _currentAttendanceData = data;

    const students = data.students || [];
    const dates    = Object.keys(data.dates || {}).sort();
    const att      = data.attendance || {};
    const summary  = data.summary   || {};

    if (students.length === 0) {
      results.innerHTML = `<div class="alert alert-warning py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i>No hay estudiantes matriculados en este curso.
      </div>`;
      return;
    }

    const hasData = summary.has_attendance_data && dates.length > 0;

    const statusCell = (status) => {
      if (status === 'P') return '<td class="att-p">P</td>';
      if (status === 'A') return '<td class="att-a">A</td>';
      if (status === 'L') return '<td class="att-l">L</td>';
      return '<td class="att-empty">—</td>';
    };

    const tableHtml = `
      <div class="d-flex gap-2 align-items-center mb-3 flex-wrap">
        <span class="badge bg-primary">${students.length} estudiantes</span>
        ${hasData
          ? `<span class="badge bg-success">${dates.length} fechas registradas</span>`
          : `<span class="badge bg-warning text-dark"><i class="bi bi-exclamation-triangle me-1"></i>Sin datos de Roll Call</span>`
        }
        ${data.course?.instructor ? `<span class="text-muted small ms-2"><i class="bi bi-person-fill me-1"></i>${data.course.instructor}</span>` : ''}
      </div>
      ${!hasData ? `<div class="alert alert-info py-2 small mb-3">
        <i class="bi bi-info-circle me-1"></i>
        Este curso no tiene asignaciones de "Roll Call Attendance" en Canvas. Se muestran los estudiantes matriculados sin datos de asistencia.
      </div>` : ''}
      <div class="att-table-wrap">
        <table class="table table-sm att-table mb-0">
          <thead>
            <tr>
              <th class="att-th-student">Estudiante</th>
              ${hasData ? `<th class="att-th-total">Total P</th>
              ${dates.map(d => `<th class="att-th-date" title="${d}">${d.substring(5)}</th>`).join('')}` : ''}
            </tr>
          </thead>
          <tbody>
            ${students.map(student => {
              const studentAtt = att[String(student.id)] || {};
              const total = dates.filter(d => studentAtt[d] === 'P').length;
              return `<tr>
                <td class="att-td-student">
                  <div class="fw-semibold">${student.name || '—'}</div>
                  <div class="text-muted" style="font-size:.72rem">#${student.id}${student.login ? ' · ' + student.login : ''}</div>
                </td>
                ${hasData ? `<td class="att-total">${total}/${dates.length}</td>
                ${dates.map(d => statusCell(studentAtt[d])).join('')}` : ''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      ${hasData ? `<div class="att-legend">
        <span class="att-p-leg">P = Presente</span>
        <span class="att-a-leg">A = Ausente</span>
        <span class="att-l-leg">L = Tardanza</span>
        <span class="text-muted">— = Sin registro</span>
      </div>` : ''}`;

    results.innerHTML = tableHtml;
    if (hasData) dlBtn.style.display = 'inline-block';

  } catch(e) {
    results.innerHTML = `<div class="alert alert-danger py-2 small">
      <i class="bi bi-x-circle me-1"></i>Error: ${e.message}
    </div>`;
  } finally {
    setLoading(btn, false);
  }
}

function downloadAttendanceExcel(courseId, courseName) {
  if (!_currentAttendanceData) {
    toast('Primero carga los datos de asistencia', 'warning');
    return;
  }

  const data  = _currentAttendanceData;
  const dates = Object.keys(data.dates || {}).sort();
  const att   = data.attendance || {};

  const rows = [
    [`Reporte de Asistencias — ${courseName}`],
    data.course?.instructor ? [`Docente: ${data.course.instructor}`] : [],
    [`Generado: ${new Date().toLocaleString('es-PY')}`],
    [],
    ['ID', 'Estudiante', 'Login', ...dates, 'Total P', 'Porcentaje'],
  ];

  data.students.forEach(student => {
    const studentAtt = att[String(student.id)] || {};
    const total = dates.filter(d => studentAtt[d] === 'P').length;
    const pct   = dates.length > 0 ? Math.round((total / dates.length) * 100) : 0;
    rows.push([
      student.id,
      student.name || '—',
      student.login || '—',
      ...dates.map(d => {
        const s = studentAtt[d];
        return s === 'P' ? 'Presente' : s === 'A' ? 'Ausente' : s === 'L' ? 'Tardanza' : '';
      }),
      total,
      `${pct}%`
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [
    { wch: 8 },
    { wch: 25 },
    ...dates.map(() => ({ wch: 12 })),
    { wch: 8 },
    { wch: 12 }
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Asistencias');
  XLSX.writeFile(wb, `REPORTE_ASISTENCIA_${courseId}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function openExcelCourses() {
  showSpreadsheet({
    title: 'Carga conjunta de cursos Canvas',
    columns: [
      { key: 'name',          label: 'Nombre del curso',  required: true,  width: 220 },
      { key: 'course_code',   label: 'Código',             required: true,  width: 120 },
      { key: 'sis_course_id', label: 'SIS Course ID',      required: false, width: 130, placeholder: 'ej. MAT101-2026' },
      { key: 'start_at',      label: 'Inicio',             required: false, width: 110, placeholder: 'YYYY-MM-DD' },
      { key: 'end_at',        label: 'Fin',                required: false, width: 110, placeholder: 'YYYY-MM-DD' },
    ],
    onImport: async (rows) => {
      const result = await api.post('/canvas/courses/bulk', {
        courses: rows.map(r => ({
          name:          r.name,
          course_code:   r.course_code,
          sis_course_id: r.sis_course_id || null,
          start_at:      r.start_at      || null,
          end_at:        r.end_at        || null,
        })),
      });
      _cache?.invalidate?.('canvas:courses:');
      loadCourses();
      return result;
    },
  });
}

function openBulkAttendanceDownload() {
  const courseOptions = _allCourses.map(c =>
    `<label class="form-check mb-2">
      <input class="form-check-input course-checkbox" type="checkbox" value="${c.id}" data-name="${c.name}">
      <span class="form-check-label">[${c.id}] ${c.name}</span>
    </label>`
  ).join('');

  showModal('Descargar reportes de asistencias conjuntos', `
    <p class="text-muted small mb-3">Selecciona los cursos de los cuales deseas obtener el reporte de asistencias. Se descargará un archivo Excel por cada curso.</p>
    <div style="max-height:400px;overflow-y:auto;border:1px solid var(--card-border);padding:12px;border-radius:6px">
      ${courseOptions || '<div class="text-muted text-center py-3">Cargando cursos...</div>'}
    </div>
    <div class="mt-3">
      <button type="button" class="btn btn-sm btn-outline-primary me-1" onclick="selectAllCourses(true)"><i class="bi bi-check-all me-1"></i>Seleccionar todos</button>
      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="selectAllCourses(false)"><i class="bi bi-x me-1"></i>Deseleccionar todos</button>
    </div>
    <div id="bulkProgress" class="mt-3" style="display:none">
      <div class="progress mb-2" style="height:24px">
        <div id="progressBar" class="progress-bar bg-success" style="width:0%;line-height:24px;font-size:0.85rem">0%</div>
      </div>
      <div id="progressText" class="text-muted small"></div>
    </div>`,
    `<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
     <button class="btn btn-primary" id="bulkDownloadBtn" onclick="doBulkAttendanceDownload()"><i class="bi bi-download me-1"></i>Descargar seleccionados</button>`);
}

function selectAllCourses(select) {
  document.querySelectorAll('.course-checkbox').forEach(cb => { cb.checked = select; });
}

async function doBulkAttendanceDownload() {
  const selected = Array.from(document.querySelectorAll('.course-checkbox:checked'))
    .map(cb => ({id: cb.value, name: cb.dataset.name}));

  if (!selected.length) {
    toast('Selecciona al menos un curso', 'warning');
    return;
  }

  const btn = document.getElementById('bulkDownloadBtn');
  const progress = document.getElementById('bulkProgress');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  btn.disabled = true;
  progress.style.display = 'block';

  let completed = 0;
  for (const course of selected) {
    try {
      const resp = await fetch(`/canvas/courses/${course.id}/attendance`);
      if (!resp.ok) throw new Error(`Error ${resp.status}`);
      const data = await resp.json();

      // Construir Excel
      const dates = Object.keys(data.dates || {}).sort();
      const rows = [
        ['Reporte de Asistencias', course.name],
        ['Generado:', new Date().toLocaleString()],
        [],
        ['Estudiante', 'ID', 'Total', ...dates.map(() => '')],
      ];

      data.students.forEach(student => {
        const attendance = (data.attendance || {})[String(student.id)] || {};
        const total = Object.values(attendance).filter(v => v === 'P').length;
        rows.push([
          student.name,
          student.id,
          total,
          ...dates.map(date => {
            const status = attendance[date];
            return status === 'P' ? 'Presente' : status === 'A' ? 'Ausente' : '';
          })
        ]);
      });

      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Asistencias');
      XLSX.writeFile(wb, `asistencias_${course.id}_${course.name}.xlsx`);

      completed++;
      const percent = Math.round((completed / selected.length) * 100);
      progressBar.style.width = percent + '%';
      progressBar.textContent = percent + '%';
      progressText.textContent = `Descargados ${completed} de ${selected.length} reportes...`;

      // Pequeña pausa entre descargas
      await new Promise(r => setTimeout(r, 300));
    } catch(e) {
      toast(`Error en curso ${course.id}: ${e.message}`, 'danger');
      console.error(e);
    }
  }

  progressText.innerHTML = `<i class="bi bi-check-circle text-success me-1"></i><strong>${completed} reportes descargados exitosamente</strong>`;
  btn.disabled = false;
}

loadCourses();
</script>
{% endblock %}
