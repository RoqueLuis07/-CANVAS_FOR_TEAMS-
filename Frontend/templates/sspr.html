<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ page_title }} - USIL</title>
  <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(255, 255, 255, 0.5);
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text-main: #0f172a;
      --text-muted: #64748b;
    }
    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      background-image: radial-gradient(circle at 15% 50%, rgba(37, 99, 235, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.08), transparent 25%);
    }
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .logo-container {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-container img {
      height: 48px;
    }
    .form-control {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #e2e8f0;
      padding: 0.75rem 1rem;
      border-radius: 8px;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .btn-primary {
      background: var(--primary);
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      font-weight: 500;
      width: 100%;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover {
      color: var(--primary);
    }
    #spinner { display: none; }
  </style>
</head>
<body>

  <div class="glass-card">
    <div class="logo-container">
      <!-- Ajusta la ruta a tu logo -->
      <img src="/static/img/logos/logo_usil_azul.png" alt="USIL Logo">
      <h4 class="mt-3 mb-1 fw-bold">Restablecer Contraseña</h4>
      <p class="text-muted small">Plataformas Virtuales (Canvas y Teams)</p>
    </div>

    <div id="alertBox" class="alert d-none" role="alert"></div>

    <form id="ssprForm" onsubmit="submitForm(event)">
      <div class="mb-3">
        <label for="cedula" class="form-label fw-semibold small">Número de Documento (Cédula)</label>
        <input type="text" class="form-control" id="cedula" name="cedula" required placeholder="Ej. 1234567">
      </div>
      <div class="mb-4">
        <label for="email" class="form-label fw-semibold small">Correo Electrónico Personal</label>
        <input type="email" class="form-control" id="email" name="email" required placeholder="tu-correo@gmail.com">
        <div class="form-text small text-muted">Debe coincidir con el registrado en tu matrícula.</div>
      </div>
      
      <button type="submit" class="btn btn-primary" id="submitBtn">
        <span id="btnText">Solicitar Nueva Contraseña</span>
        <span id="spinner" class="spinner-border spinner-border-sm ms-2" role="status" aria-hidden="true"></span>
      </button>
    </form>
  </div>

  <script>
    async function submitForm(e) {
      e.preventDefault();
      const form = document.getElementById('ssprForm');
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const alertBox = document.getElementById('alertBox');
      
      // UI Loading state
      btn.disabled = true;
      btnText.textContent = 'Procesando...';
      spinner.style.display = 'inline-block';
      alertBox.className = 'alert d-none';
      
      const formData = new FormData(form);
      
      try {
        const response = await fetch('/api/sspr/reset', {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        
        if (response.ok) {
          alertBox.className = 'alert alert-success';
          alertBox.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>' + data.message;
          form.reset();
        } else {
          alertBox.className = 'alert alert-danger';
          alertBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-2"></i>' + (data.detail || 'Ocurrió un error.');
        }
      } catch (err) {
        alertBox.className = 'alert alert-danger';
        alertBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-2"></i>Error de conexión.';
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Solicitar Nueva Contraseña';
        spinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
